name: Build and Release

on:
  workflow_run:
    workflows: ["Auto Version Tag from PR Title"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: read

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet Packages
        run: nuget restore LaunchBoxRommPlugin.slnx

      - name: Build Solution (Release)
        run: msbuild LaunchBoxRommPlugin.slnx /p:Configuration=Release

      - name: Extract version from tag
        id: vars
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            $version = "${env:GITHUB_REF_NAME}"
          } else {
            git fetch --tags
            $version = git describe --tags --abbrev=0
          }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Create package folder structure
        shell: cmd
        run: |
          mkdir package
          mkdir "package\RomM LaunchBox Integration"

      - name: Copy required binaries
        shell: cmd
        run: |
          copy RommPlugin.CLI\bin\Release\Newtonsoft.Json.* "package\RomM LaunchBox Integration\"
          copy RommPlugin.CLI\bin\Release\RommPlugin.CLI.* "package\RomM LaunchBox Integration\"
          copy RommPlugin.CLI\bin\Release\RommPlugin.Core.* "package\RomM LaunchBox Integration\"
          copy RommPlugin.CLI\bin\Release\RommPlugin.* "package\RomM LaunchBox Integration\"
          copy RommPlugin.CLI\bin\Release\RommPlugin.UI.* "package\RomM LaunchBox Integration\"

      - name: Copy Images folder
        shell: cmd
        run: |
          xcopy Images "package\RomM LaunchBox Integration\Images\" /E /I /Y

      - name: Copy settings.json
        shell: cmd
        run: |
          copy settings.json "package\RomM LaunchBox Integration\"

      - name: Create ZIP with version
        shell: powershell
        run: |
          $zipName = "launchbox-romm-plugin-${{ steps.vars.outputs.VERSION }}.zip"
          Compress-Archive -Path package\* -DestinationPath $zipName

      - name: Generate Changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          configurationJson: |
            {
              "categories": [
                {
                  "title": "💥 New Version",
                  "rules": [
                    { "title": "^breaking" },
                    { "title": "^version" }
                  ]
                },
                {
                  "title": "🚀 Features",
                  "rules": [
                    { "title": "^feat" }
                  ]
                },
                {
                  "title": "🐛 Fixes",
                  "rules": [
                    { "title": "^fix" },
                    { "title": "^bug" }
                  ]
                },
                {
                  "title": "🧰 Maintenance",
                  "rules": [
                    { "title": "^refactor" },
                    { "title": "^chore" }
                  ]
                }
              ]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: launchbox-romm-plugin-${{ steps.vars.outputs.VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}